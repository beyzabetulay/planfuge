services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      PLANFUGE_RUN_PIPELINE_ON_STARTUP: "${PLANFUGE_RUN_PIPELINE_ON_STARTUP:-1}"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
